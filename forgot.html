<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password - CodePath Academy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="brand">CodePath Academy</div>

<div class="auth-container">
  <h2>Reset Password 🔐</h2>
  <p class="subtext">Enter your email to reset password</p>

  <input type="email" id="forgotEmail" placeholder="Enter Email">

  <button class="primary-btn" onclick="resetPassword()">Send Reset Link</button>

  <p class="switch-text">
    Remember your password?
    <a href="login.html">Login</a>
  </p>
</div>

<script src="script.js"></script>
</body>
</html>
