<!DOCTYPE html>
<html>
<head>
  <title>Login - CodePath Academy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="brand">CodePath Academy</div>

<div class="auth-container">
  <h2>Welcome Back 👋</h2>
  <p class="subtext">Login to continue learning</p>

  <input type="email" id="loginEmail" placeholder="Enter Email">
  <input type="password" id="loginPassword" placeholder="Enter Password">

  <button class="primary-btn" onclick="login()">Login</button>

  <div class="link-row">
    <a href="forgot.html">Forgot Password?</a>
  </div>

  <div class="divider">OR</div>

  <button class="google-btn">Sign in with Google</button>
  <button class="linkedin-btn">Sign in with LinkedIn</button>

  <p class="switch-text">
    Don't have an account?
    <a href="signup.html">Sign Up</a>
  </p>
</div>

<script src="script.js"></script>
</body>
</html>
